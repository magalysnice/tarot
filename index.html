<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarot Premium 🔮</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen">

<div class="max-w-md mx-auto p-4">
  <h1 class="text-2xl font-bold text-center mb-2">🔮 Nadie esperaba esto…</h1>
  <p class="text-center text-sm opacity-70 mb-4">Descubre lo que se oculta en tu destino</p>

  <div class="flex gap-2 justify-center mb-4">
    <button onclick="setSpread(1)" class="bg-purple-700 px-3 py-1 rounded">1 Carta</button>
    <button onclick="setSpread(3)" class="bg-purple-700 px-3 py-1 rounded">3 Cartas</button>
  </div>

  <input id="name" placeholder="Nombre completo" class="w-full p-3 mb-2 bg-black border border-purple-500 rounded" />

  <label class="text-xs opacity-70">Fecha de nacimiento</label>
  <input id="dob" type="date" class="w-full p-3 mb-4 bg-black border border-purple-500 rounded" />

  <button onclick="draw()" class="w-full bg-purple-600 py-3 rounded-xl">Revelar destino ✨</button>

  <div id="result" class="mt-6 space-y-4"></div>
  <div id="paypal-button-container" class="mt-6"></div>
</div>

<script>
let currentSpread = 1;
function setSpread(n){ currentSpread = n === 3 ? 3 : 1; }

const tarotImages = [
  "https://images.unsplash.com/photo-1604881991720-f91add269bed?w=400",
  "https://images.unsplash.com/photo-1492724441997-5dc865305da7?w=400",
  "https://images.unsplash.com/photo-1520975916090-3105956dac38?w=400",
  "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=400"
];

const shortPredictions = [
  "Alguien piensa en ti",
  "Cambio positivo cerca",
  "Confía en tu intuición",
  "Oportunidad inesperada",
  "Algo oculto saldrá"
];

function getZodiacSign(dob){
  if(!dob) return "Tu signo";
  const d = new Date(dob);
  const day = d.getDate();
  const m = d.getMonth()+1;

  if((m==3 && day>=21)||(m==4 && day<=19)) return "Aries ♈";
  if((m==4 && day>=20)||(m==5 && day<=20)) return "Tauro ♉";
  if((m==5 && day>=21)||(m==6 && day<=20)) return "Géminis ♊";
  if((m==6 && day>=21)||(m==7 && day<=22)) return "Cáncer ♋";
  if((m==7 && day>=23)||(m==8 && day<=22)) return "Leo ♌";
  if((m==8 && day>=23)||(m==9 && day<=22)) return "Virgo ♍";
  if((m==9 && day>=23)||(m==10 && day<=22)) return "Libra ♎";
  if((m==10 && day>=23)||(m==11 && day<=21)) return "Escorpio ♏";
  if((m==11 && day>=22)||(m==12 && day<=21)) return "Sagitario ♐";
  if((m==12 && day>=22)||(m==1 && day<=19)) return "Capricornio ♑";
  if((m==1 && day>=20)||(m==2 && day<=18)) return "Acuario ♒";
  return "Piscis ♓";
}

function draw(){
  const name = document.getElementById("name").value.trim();
  const dob = document.getElementById("dob").value;

  if(!name || !dob){
    alert("Introduce nombre y fecha correctamente");
    return;
  }

  const zodiac = getZodiacSign(dob);
  let html = "";

  for(let i=0;i<currentSpread;i++){
    const img = tarotImages[Math.floor(Math.random()*tarotImages.length)];
    const text = shortPredictions[Math.floor(Math.random()*shortPredictions.length)];

    html += `
    <div class="bg-black border border-purple-500 rounded-xl p-3">
      <img src="${img}" class="w-full h-32 object-cover rounded mb-2"/>
      <p class="text-xs text-center opacity-70">${name} · ${zodiac}</p>
      <p class="text-sm text-center">${text}</p>
    </div>`;
  }

  document.getElementById("result").innerHTML = html;

  renderPayPal(name, zodiac);
}

function generatePrediction(name,zodiac){
  const predictions = [
`<p>${name}, como ${zodiac}, estás entrando en una etapa donde tu energía comienza a alinearse con decisiones que llevabas tiempo evitando. En el amor, se perciben sentimientos más profundos de lo que aparenta la otra persona, lo que puede llevar a una conversación importante en los próximos días. Es posible que descubras intenciones ocultas que cambiarán tu percepción.</p>
<p>En el dinero, aparece una oportunidad que no será evidente al principio, pero que puede traerte estabilidad si sabes actuar con inteligencia. Evita decisiones impulsivas y analiza bien cada paso.</p>
<p>En la salud, tu cuerpo te pide equilibrio. Es momento de descansar más y escuchar señales internas. Un cambio en tu rutina traerá beneficios importantes.</p>
<p>Tu entorno se transforma lentamente, y una persona cercana influirá en una decisión clave. Confía en tu intuición, porque será más precisa que cualquier consejo externo.</p>
<p>Este es un momento de evolución, donde cada paso que des tendrá un impacto significativo en tu futuro.</p>`,

`<p>${name}, como ${zodiac}, estás atravesando una etapa de cambios donde lo emocional cobra protagonismo. En el amor, hay alguien que siente más de lo que expresa, y esto puede generar confusión si no se aclaran las intenciones.</p>
<p>En el dinero, se presentan señales positivas, pero necesitarás paciencia para ver resultados reales. Evita gastos innecesarios y prioriza estabilidad.</p>
<p>Tu salud refleja tu estado mental. Si estás acumulando estrés, es momento de liberar tensión y buscar momentos de calma.</p>
<p>Una oportunidad inesperada puede aparecer en los próximos días, pero dependerá de tu capacidad de reacción aprovecharla.</p>
<p>Confía en tu proceso y no te compares con otros, ya que tu camino es único.</p>`,

`<p>${name}, como ${zodiac}, tu energía está cambiando y eso atrae nuevas oportunidades. En el amor, hay una conexión que comienza a fortalecerse, incluso si aún no es evidente.</p>
<p>En el dinero, podrías recibir noticias positivas relacionadas con trabajo o ingresos adicionales.</p>
<p>En la salud, es importante mantener hábitos constantes y evitar excesos.</p>
<p>Una decisión importante se aproxima, y dependerá de tu intuición elegir el camino correcto.</p>
<p>Este es un momento ideal para avanzar sin miedo y confiar en lo que viene.</p>`,

`<p>${name}, como ${zodiac}, estás en una fase de crecimiento personal. En el amor, es posible que una relación evolucione o cambie de forma inesperada.</p>
<p>En el dinero, hay señales de mejora si mantienes disciplina.</p>
<p>Tu salud necesita atención en pequeños detalles diarios.</p>
<p>Un cambio emocional marcará tu camino en los próximos días.</p>
<p>Confía en ti y en las decisiones que tomes.</p>`,

`<p>${name}, como ${zodiac}, se abren nuevas posibilidades en tu vida. En el amor, alguien podría acercarse con intenciones claras.</p>
<p>En el dinero, es momento de aprovechar oportunidades.</p>
<p>Tu salud mejora si reduces el estrés.</p>
<p>Una noticia inesperada traerá cambios positivos.</p>
<p>Tu intuición será clave en este proceso.</p>`,

`<p>${name}, como ${zodiac}, estás dejando atrás situaciones que ya no te aportan. En el amor, hay claridad en tus sentimientos.</p>
<p>En el dinero, estabilidad progresiva.</p>
<p>Tu salud mejora si mantienes equilibrio.</p>
<p>Un cambio importante se acerca.</p>
<p>Confía en lo que estás construyendo.</p>`,

`<p>${name}, como ${zodiac}, tu entorno comienza a transformarse. En el amor, alguien podría sorprenderte.</p>
<p>En el dinero, oportunidades nuevas.</p>
<p>Tu salud necesita descanso.</p>
<p>Una decisión cambiará tu rumbo.</p>
<p>Escucha tu intuición.</p>`,

`<p>${name}, como ${zodiac}, estás en un momento clave. En el amor, hay emociones intensas.</p>
<p>En el dinero, estabilidad cercana.</p>
<p>Tu salud mejora si te cuidas.</p>
<p>Un cambio positivo llegará.</p>
<p>Es momento de avanzar.</p>`,

`<p>${name}, como ${zodiac}, tu destino se está activando. En el amor, una conexión fuerte aparece.</p>
<p>En el dinero, buenas noticias.</p>
<p>Tu salud mejora con descanso.</p>
<p>Un cambio importante se acerca.</p>
<p>Confía en lo que viene.</p>`,

`<p>${name}, como ${zodiac}, todo empieza a alinearse. En el amor, claridad emocional.</p>
<p>En el dinero, oportunidad inesperada.</p>
<p>Tu salud necesita equilibrio.</p>
<p>Un evento marcará tu camino.</p>
<p>Este es tu momento.</p>`
  ];

  return predictions[Math.floor(Math.random() * predictions.length)];
}

function unlock(name,zodiac){
  const div=document.createElement("div");
  div.className="mt-4 p-4 border border-white rounded";
  div.innerHTML=generatePrediction(name,zodiac);
  document.getElementById("result").appendChild(div);
}

function renderPayPal(name,zodiac){
  const container=document.getElementById("paypal-button-container");
  container.innerHTML="";

  // texto informativo antes del pago
  const info=document.createElement("p");
  info.className="text-center text-sm mb-2 opacity-80";
  info.innerText="Para ver la predicción completa debes realizar un pago de U$3";
  container.appendChild(info);

  const btn=document.createElement("a");
  btn.href="https://www.paypal.com/ncp/payment/GN4SPT3DEPUY4";
  btn.target="_blank";
  btn.className="block text-center bg-yellow-500 text-black py-3 rounded-xl font-bold";
  btn.innerText="Pagar con PayPal";

  container.appendChild(btn);

  btn.onclick = () => {
    setTimeout(()=>unlock(name,zodiac),3000);
  };
}
</script>

</body>
</html>
